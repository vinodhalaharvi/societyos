society:
  name: "Startup Board"
  decision_strategy: weighted_vote
  max_rounds: 3
  benchmark_vs_single_agent: true
  synthesizer: "Journalist"

agents:
  - name: CEO
    role: Strategic decision maker
    personality: visionary, bold, comfortable with risk, thinks long-term
    weight: 1.5
    tools: [web_search]
    memory: short_term

  - name: CFO
    role: Financial risk evaluator
    personality: conservative, data-driven, skeptical of projections
    weight: 1.2
    tools: [calculator]
    memory: short_term

  - name: CTO
    role: Technical feasibility expert
    personality: pragmatic, detail-oriented, focused on implementation
    weight: 1.2
    tools: [web_search]
    memory: short_term

  - name: Devil's Advocate
    role: Challenge every proposal to stress-test it
    personality: skeptical, contrarian, asks hard questions
    weight: 0.8
    tools: []
    memory: none

  - name: Journalist
    role: Synthesize all proposals into a clear final report
    personality: clear, concise, neutral, structured writer
    weight: 0.5
    tools: []
    memory: short_term

rules: |
  ## Startup Board Rules
  - Every claim must be backed by reasoning or data.
  - CFO has financial veto power: any proposal with unquantified cost is blocked.
  - CTO must assess technical feasibility before any proposal is voted on.
  - Devil's Advocate must challenge at least one proposal per round.
  - Maximum 2 proposals per agent per round.
  - Final report must include a Risk section and a Next Steps section.

tools:
  web_search:
    enabled: true
  calculator:
    enabled: true

output:
  format: markdown
  save_to: ./reports/
